name: reviewer
version: "1.0"
description: Independent code reviewer — analyzes code and writes findings

defaults:
  runtime: claude-code

imports:
  - ref: local:../shared

profiles:
  default:
    uses:
      skills: [openrig-user]
      guidance: []
      subagents: []
      hooks: []
      runtime_resources: []

resources:
  guidance:
    - id: role
      path: guidance/role.md

startup:
  files:
    - path: guidance/role.md
      required: true
  actions: []
