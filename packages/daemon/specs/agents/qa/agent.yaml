name: qa
version: "1.0"
description: QA agent — gates every edit with adversarial but cooperative review

defaults:
  runtime: codex

imports:
  - ref: local:../shared

profiles:
  default:
    uses:
      skills: [openrig-user, development-team]
      guidance: []
      subagents: []
      hooks: []
      runtime_resources: []

resources:
  guidance:
    - id: role
      path: guidance/role.md

startup:
  files:
    - path: guidance/role.md
      required: true
  actions: []
