version: "0.2"
name: secrets-manager
summary: >
  A rig backed by HashiCorp Vault in dev mode. Proves the services
  substrate: Vault boots before agents, health is gated, and the env
  receipt is captured. Agents can read secrets via the Vault HTTP API.

services:
  kind: compose
  compose_file: secrets-manager.compose.yaml
  project_name: openrig-secrets
  down_policy: down
  wait_for:
    - url: http://127.0.0.1:8200/v1/sys/health
  surfaces:
    urls:
      - name: Vault UI
        url: http://127.0.0.1:8200/ui
      - name: Vault API
        url: http://127.0.0.1:8200/v1
    commands:
      - name: Vault status
        command: "vault status -address=http://127.0.0.1:8200"

pods:
  - id: dev
    label: Development
    members:
      - id: impl
        agent_ref: "local:agents/impl"
        runtime: claude-code
        profile: default
        cwd: "."
    edges: []

edges: []
